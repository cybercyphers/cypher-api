    <script>
          document.addEventListener("DOMContentLoaded", () => { 
            console.log("website load was successfull")
  // theme 
  const button = document.getElementById("Theme");

  // 1) APPLY THEME IMMEDIATELY
  let savedTheme = localStorage.getItem("theme");

  if (!savedTheme) {
    const systemTheme =
      window.matchMedia("(prefers-color-scheme: dark)").matches;

    savedTheme = systemTheme ? "dark" : "light";

    localStorage.setItem("theme", savedTheme);
   console.log("Theme saved to localStorage");
  }

  document.body.classList.remove("light", "dark");
  document.body.classList.add(savedTheme);

  function changeIcon(){
if(document.body.classList.contains("dark")){
    button.innerHTML ="Light Mode";
  }else{
  button.innerHTML = "Dark Mode";
   }
  }

  // 2) TOGGLE ON CLICK
  button.addEventListener("click", () => {
    changeIcon()
    let currentTheme = localStorage.getItem("theme");

    document.body.classList.remove("light", "dark");

    const newTheme =
      currentTheme === "dark" ? "light" : "dark";

    document.body.classList.add(newTheme);

    localStorage.setItem("theme", newTheme);
  });

const rightMenu = document.getElementById("rightMenu")
  const openCloseMenu = document.getElementById("openCloseMenu");
let open = false
  openCloseMenu.addEventListener("click",()=>{
  
    if(open===false){
  rightMenu.style.right = 0+"px";
    return open = true;
    }else{
    rightMenu.style.right = -1000+"px";
 return open = false;
    }
  })
document.addEventListener("click",(e)=>{
  if(open&&!rightMenu.contains(e.target)&& !openCloseMenu.contains(e.target)){
  rightMenu.style.right = -1000+"px";
    open = false;
  }
})
        window.iP=async function (){
            try{
            const ipReq = await fetch("/cyphers/ip");
            const ipRes = await ipReq.json()
          const ip = ipRes.ip;
          return `Your Ip Address is : ${ip}`;
            }catch(err){
              console.log(err)
            }
         }
            const ipContainer = document.getElementById("ipContainer");
            (async ()=>{
             const address=  await iP();
              ipContainer.textContent = address;
              
            })()
              
              const emailForm=document.getElementById("emailForm");
              emailForm.addEventListener("submit", async(e)=>{
                  const StartEmail = document.getElementById("startEmail").value
                  const start = document.getElementById("start");
                  e.preventDefault()
   const req = await fetch("https://panel-cyphers.nett.to/cyphers/startEmail",{ 
       method : "POST",
       headers : {
       "Content-Type" : "application/json"
},
       body: JSON.stringify({
          startEmail : StartEmail
          
 })
   })
       const res= await req.json();
         if(res.message === "continue"){
        localStorage.setItem("verified", "true")    
             location.reload()
             localStorage.setItem("name",StartEmail);
       start.style.display="none";
   }
                  else{
   start.style.display="flex";              localStorage.setItem("verified","false")
  }
})  
function isVerified(){
     if(localStorage.getItem("verified")==="true"){
 start.style.display ="none";
}
}
              isVerified()
              function update(){
    const Header = document.getElementById("headerH2")
     Header.innerHTML = `Welcome, ${localStorage.getItem("name") || 'new user'}`
              }
    
            update()
});
